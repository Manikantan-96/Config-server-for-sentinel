#Server configuration
server.port=8001
server.servlet.context-path=/workflow
#db config
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/orchestrator_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Manikantan@496}

# Default CircuitBreaker configuration
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.sliding-window-type=count_based
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=5

#Assigning characteristics of circuit breaker
resilience4j.circuitbreaker.instances.myCircuitBreakerInventory1.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerInventory2.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerNotification.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerPayment1.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerPayment2.base-config=default

#Retry Configuration
resilience4j.retry.instances.myRetry.wait-duration=100ms
resilience4j.retry.instances.myRetry.max-attempts=3
resilience4j.retry.instances.myRetry.retry-exceptions=feign.FeignException

#Bulkhead configuration
resilience4j.bulkhead.instances.myBulkhead.max-concurrent-calls=10
resilience4j.bulkhead.instances.myBulkhead.max-wait-duration=0

#RateLimiter configuration
resilience4j.ratelimiter.instances.myRateLimiter.limit-for-period=15
resilience4j.ratelimiter.instances.myRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.myRateLimiter.timeout-duration=500ms

#Monitoring
management.endpoint.circuitbreakers.enabled=true


#Time Limiter Configuration
resilience4j.timelimiter.instances.myCircuitbreaker.timeout-duration=1s
resilience4j.timelimiter.instances.myCircuitbreaker.cancel-running-future=true
