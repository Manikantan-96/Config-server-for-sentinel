#server Configuration
server.port=8003
server.servlet.context-path=/inventory
# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/inventory_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mani@444}

#Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

#CircuitBreaker configuration
resilience4j.circuitbreaker.instances.myCircuitBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.myCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.myCircuitBreaker.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.myCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.myCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.myCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.myCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.myCircuitBreaker.permitted-number-of-calls-in-half-open-state=5

#Retry Configuration
resilience4j.retry.instances.myRetry.wait-duration=100ms
resilience4j.retry.instances.myRetry.max-attempts=3
resilience4j.retry.instances.myRetry.retry-exceptions=feign.FeignException
