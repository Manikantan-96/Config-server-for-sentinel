# Server Configuration
server.port=8002
server.servlet.context-path=/payment
# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/payment_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mani@444}

#Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379


# Default CircuitBreaker configuration
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.sliding-window-type=count_based
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=5
#Assigning characteristics of circuit breaker
resilience4j.circuitbreaker.instances.myCircuitBreakerInventory.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerPaymentSuccess.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerPaymentRefunded.base-config=default
resilience4j.circuitbreaker.instances.myCircuitBreakerFailedBalance.base-config=default
#Retry Configuration
resilience4j.retry.instances.myRetry.wait-duration=100ms
resilience4j.retry.instances.myRetry.max-attempts=3
resilience4j.retry.instances.myRetry.retry-exceptions=feign.FeignException
